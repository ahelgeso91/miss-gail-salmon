<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thanks! | Miss Gail Salmon Co.</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --ocean: #1a5276;
            --salmon: #e67e22;
            --cream: #fdfbf7;
            --charcoal: #2c3e50;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--cream);
            color: var(--charcoal);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }
        
        .success-container {
            max-width: 600px;
        }
        
        .success-icon {
            font-size: 4rem;
            margin-bottom: 1.5rem;
        }
        
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            color: var(--ocean);
            margin-bottom: 1rem;
        }
        
        p {
            font-size: 1.2rem;
            line-height: 1.7;
            margin-bottom: 2rem;
            color: #555;
        }
        
        .home-btn {
            display: inline-block;
            background: var(--salmon);
            color: white;
            padding: 1rem 2.5rem;
            text-decoration: none;
            font-weight: 600;
            border-radius: 4px;
            transition: transform 0.3s;
        }
        
        .home-btn:hover {
            transform: translateY(-2px);
        }
        
        .divider {
            width: 60px;
            height: 3px;
            background: var(--ocean);
            margin: 2rem auto;
        }
    </style>
</head>
<body>
    <div class="success-container">
        <div class="success-icon">🎣</div>
        <h1>You're on the list!</h1>
        <div class="divider"></div>
        <p>Thanks for your interest in Miss Gail Salmon Co. We'll be in touch when the first catch hits San Diego this fall.</p>
        <p style="font-size: 1rem; color: #777;">Questions? Email us at <a href="mailto:hello@missgailsalmon.com" style="color: var(--ocean);">hello@missgailsalmon.com</a></p>
        <a href="/" class="home-btn">Back to Website</a>
    </div>
</body>
</html>
